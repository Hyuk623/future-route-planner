<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미리길 - 미래 경로 예측 길안내</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar / Input Panel -->
        <aside class="glass-panel sidebar">
            <header class="app-header">
                <h1><i class="fa-solid fa-route"></i> 미리길</h1>
                <p>미래의 출발 시간에 맞춘 예측 길안내</p>
            </header>

            <div class="input-section">
                <!-- Transport Mode Tabs -->
                <div class="transport-tabs">
                    <button class="tab-btn active" data-mode="driving"><i class="fa-solid fa-car"></i> 자동차</button>
                    <button class="tab-btn" data-mode="transit"><i class="fa-solid fa-train-subway"></i> 대중교통</button>
                    <button class="tab-btn" data-mode="cycling"><i class="fa-solid fa-bicycle"></i> 자전거</button>
                    <button class="tab-btn" data-mode="walking"><i class="fa-solid fa-person-walking"></i> 도보</button>
                </div>

                <!-- Location Inputs -->
                <div class="location-inputs">
                    <div class="input-group">
                        <i class="fa-solid fa-location-dot input-icon text-blue"></i>
                        <input type="text" id="start-input" placeholder="출발지 검색 (예: 서울역, 강남역, 도로명 주소)" autocomplete="off">
                        <div id="start-suggestions" class="suggestions-box hidden"></div>
                    </div>
                    <div class="input-divider">
                        <i class="fa-solid fa-ellipsis-vertical"></i>
                    </div>
                    <div class="input-group">
                        <i class="fa-solid fa-location-dot input-icon text-red"></i>
                        <input type="text" id="end-input" placeholder="도착지 검색 (예: 해운대, 부산역, 도로명 주소)" autocomplete="off">
                        <div id="end-suggestions" class="suggestions-box hidden"></div>
                    </div>
                </div>

                <!-- Route Options (Only shown when Driving is active) -->
                <div id="route-options-container" class="route-options-container">
                    <span class="options-label">경로 탐색 옵션</span>
                    <div class="route-options">
                        <button class="option-chip active" data-route-opt="recommended">추천</button>
                        <button class="option-chip" data-route-opt="highway">고속도로 우선</button>
                        <button class="option-chip" data-route-opt="fastest">최단 시간</button>
                        <button class="option-chip" data-route-opt="shortest">최단 거리</button>
                        <button class="option-chip" data-route-opt="free">무료도로 우선</button>
                        <button class="option-chip" data-route-opt="schoolzone">어린이 보호구역 회피</button>
                    </div>
                </div>

                <!-- DateTime Inputs -->
                <div class="datetime-inputs">
                    <div class="input-group">
                        <i class="fa-regular fa-calendar input-icon"></i>
                        <input type="date" id="date-input">
                    </div>
                    <div class="input-group">
                        <i class="fa-regular fa-clock input-icon"></i>
                        <input type="time" id="time-input">
                    </div>
                </div>

                <button id="predict-btn" class="primary-btn">
                    <i class="fa-solid fa-wand-magic-sparkles"></i> 변수 예측 길찾기
                </button>

                <!-- Dev Warning for non-driving modes -->
                <div id="dev-warning" class="dev-warning hidden">
                    <i class="fa-solid fa-person-digging text-warning" style="font-size: 32px; margin-bottom: 12px;"></i>
                    <h3 style="margin-bottom: 8px;">개발 중인 기능입니다</h3>
                    <p style="font-size: 13px; color: var(--text-secondary); line-height: 1.5;">
                        실제 버스/지하철 노선 시간표 및 자전거/도보 전용 도로망 데이터 연동을 준비하고 있습니다.<br><br>
                        현재는 <b>자동차</b> 길찾기만 이용 가능합니다.
                    </p>
                </div>
            </div>

            <!-- Results Panel (Hidden by default) -->
            <div id="results-panel" class="results-section hidden">
                <div class="summary-cards">
                    <!-- Base Estimate -->
                    <div class="base-summary">
                        <span class="label">이상적 소요 시간 (현재 기준)</span>
                        <div class="values" id="base-values">--분 / --km</div>
                    </div>
                    <!-- Predicted Estimate -->
                    <div class="predicted-summary">
                        <span class="label">미래 예측 소요 시간 (변수 반영)</span>
                        <div class="predicted-time" id="predicted-time">--분</div>
                        <div class="predicted-diff" id="predicted-diff">+0분 지연 예상</div>
                    </div>
                </div>

                <h3 class="section-title">발견된 영향 변수</h3>
                <div id="impact-list" class="impact-list">
                    <!-- Impact items will be injected here via JS -->
                </div>
            </div>
            
            <!-- Loading Overlay -->
            <div id="loading-overlay" class="loading-overlay hidden">
                <div class="spinner"></div>
                <p>수만 개의 미래 데이터를 시뮬레이션 중...</p>
            </div>
        </aside>

        <!-- Main Map Area -->
        <main class="map-area">
            <div id="map"></div>
            <div id="map-tooltip" class="map-tooltip hidden">
                <i class="fa-solid fa-map-pin"></i> 지도를 클릭하여 위치를 선택하세요
            </div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
